version: '3.9'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: falcon-server
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/data/humble-falcon.sqlite
      - UPLOAD_DIR=/data/uploads
      - MAIL_HOST=host.docker.internal
    volumes:
      - falcon-data:/data
    networks:
      - falcon-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    container_name: falcon-nginx
    restart: unless-stopped
    ports:
      - "10201:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - client-build:/usr/share/nginx/html:ro
    networks:
      - falcon-net
    depends_on:
      - server

  client-builder:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: falcon-client-builder
    volumes:
      - client-build:/output
    profiles:
      - build

volumes:
  falcon-data:
  client-build:

networks:
  falcon-net:
    driver: bridge
